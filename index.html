<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESP32-S3 功耗监控</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'SF Mono', 'Fira Code', monospace;
    background: #0d1117;
    color: #e6edf3;
    min-height: 100vh;
    width: 100%;
    padding: 24px;
    display: flex;
    flex-direction: column;
  }
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 24px;
    width: 100%;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  header h1 { font-size: 13px; font-weight: 500; letter-spacing: 0.08em; color: #7d8590; text-transform: uppercase; }
  #status-dot { width: 8px; height: 8px; border-radius: 50%; background: #3fb950; box-shadow: 0 0 6px #3fb950; display: inline-block; margin-right: 8px; transition: background 0.3s; }
  #status-dot.disconnected { background: #f85149; box-shadow: 0 0 6px #f85149; }
  #status-text { font-size: 12px; color: #7d8590; }

  .section-label {
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    color: #7d8590; margin: 0 0 8px;
  }

  .metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 8px;
    margin-bottom: 12px;
  }
  .metric {
    background: #161b22;
    border: 0.5px solid #30363d;
    border-radius: 8px;
    padding: 14px 16px;
  }
  .metric-label { font-size: 11px; color: #7d8590; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 6px; }
  .metric-value { font-size: 24px; font-weight: 400; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
  .metric-value span { font-size: 12px; color: #7d8590; margin-left: 3px; }
  .green  { color: #3fb950; }
  .red    { color: #f85149; }
  .purple { color: #d2a8ff; }
  .blue   { color: #79c0ff; }
  .amber  { color: #e3b341; }

  .chart-wrap {
    background: #161b22; border: 0.5px solid #30363d;
    border-radius: 8px; padding: 18px; margin-bottom: 16px;
  }

  /* ── 周期功耗计算器 ── */
  .calculator {
    background: #161b22; border: 0.5px solid #30363d;
    border-radius: 8px; padding: 16px; margin-bottom: 12px;
  }
  .calc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }
  .input-group { margin-bottom: 12px; }
  .input-group label { display: block; font-size: 11px; color: #7d8590; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 6px; }
  .input-row { display: flex; align-items: center; gap: 8px; }
  .input-row input[type=number] {
    font-family: inherit; font-size: 14px;
    background: #0d1117; border: 0.5px solid #30363d;
    color: #e6edf3; border-radius: 6px;
    padding: 6px 10px; width: 110px;
    transition: border-color 0.15s;
  }
  .input-row input[type=number]:focus { outline: none; border-color: #58a6ff; }
  .input-row .unit { font-size: 12px; color: #7d8590; }
  .btn-fill {
    font-family: inherit; font-size: 11px; letter-spacing: 0.04em;
    padding: 4px 10px; border-radius: 5px;
    border: 0.5px solid #3fb950; color: #3fb950;
    background: transparent; cursor: pointer; transition: background 0.15s;
    white-space: nowrap;
  }
  .btn-fill:hover { background: rgba(63,185,80,0.1); }

  .result-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 8px;
  }
  .result-card {
    background: #0d1117; border: 0.5px solid #30363d;
    border-radius: 8px; padding: 14px;
  }
  .result-card .r-label { font-size: 11px; color: #7d8590; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .result-card .r-value { font-size: 22px; font-weight: 400; font-variant-numeric: tabular-nums; }
  .result-card .r-value span { font-size: 12px; color: #7d8590; margin-left: 3px; }
  .result-card .r-sub { font-size: 11px; color: #7d8590; margin-top: 4px; }

  .divider { border: none; border-top: 0.5px solid #21262d; margin: 12px 0; }

  html, body { height: 100%; width: 100%; margin: 0; }
  body { min-height: 100vh; width: 100%; padding: 24px; display: flex; flex-direction: column; overflow: hidden; }
  main { flex: 1 1 auto; display: flex; flex-direction: column; justify-content: flex-start; gap: 16px; width: 100%; min-height: 0; overflow: hidden; }
  .chart-wrap { background: #161b22; border: 0.5px solid #30363d; border-radius: 8px; padding: 14px; flex: 1 1 auto; min-height: 180px; display: flex; flex-direction: column; overflow: hidden; }
  .chart-wrap > div { flex: 1 1 auto; min-height: 0; overflow: hidden; }
  .chart-wrap canvas { width: 100% !important; height: 100% !important; }
  .controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-top: 12px; }
  button {
    font-family: inherit; font-size: 12px;
    padding: 6px 14px; border-radius: 6px;
    border: 0.5px solid #30363d; background: #21262d;
    color: #e6edf3; cursor: pointer; transition: background 0.15s;
  }
  button:hover { background: #30363d; }
  button.danger { border-color: #f85149; color: #f85149; }
  button.danger:hover { background: rgba(248,81,73,0.1); }
  label.ctrl { font-size: 12px; color: #7d8590; }
  select {
    font-family: inherit; font-size: 12px;
    padding: 5px 10px; border-radius: 6px;
    border: 0.5px solid #30363d; background: #21262d; color: #e6edf3; cursor: pointer;
  }
  :fullscreen {
    background: #0d1117;
  }
  :fullscreen body {
    min-height: 100vh;
  }
</style>
</head>
<body>

<header>
  <h1>⚡ ESP32-S3 · 功耗监控 · 3.3V</h1>
  <div>
    <span id="status-dot" class="disconnected"></span>
    <span id="status-text">连接中...</span>
  </div>
</header>
<main>

<!-- 实时指标 -->
<p class="section-label">实时测量</p>
<div class="metrics">
         <div class="metric">
    <div class="metric-label">峰值电流</div>
    <div class="metric-value purple" id="val-peak">--<span>mA</span></div>
  </div>
  <div class="metric">
    <div class="metric-label">谷值电流</div>
    <div class="metric-value purple" id="val-valley">--<span>mA</span></div>
  </div>
  <div class="metric">
    <div class="metric-label">当前电流</div>
    <div class="metric-value purple" id="val-current">--<span>mA</span></div>
  </div>
  <div class="metric">
    <div class="metric-label">当前能耗</div>
    <div class="metric-value amber" id="val-power">--<span>mW</span></div>
  </div>
  <div class="metric">
    <div class="metric-label">平均能耗</div>
    <div class="metric-value amber" id="r-avg-power">--<span>mW</span></div>
  </div>
  <div class="metric">
    <div class="metric-label">总能耗</div>
    <div class="metric-value amber" id="val-total-energy">--<span>mWh</span></div>
  </div>
 
</div>

<!-- 曲线 -->
<div class="chart-wrap">
  <p class="section-label">电流曲线 (mA)</p>
  <div style="position:relative;width:100%;height:100%;min-height:260px;">
    <canvas id="chart-current" role="img" aria-label="实时电流曲线">实时电流</canvas>
  </div>
</div>

<!-- 续航估算 -->
<div class="calculator">
  <p class="section-label">续航估算</p>

  <div style="display:flex; gap:12px; align-items:flex-end; margin-bottom:16px; flex-wrap:wrap;">
    <div class="input-group" style="margin:0;">
      <label>电池容量</label>
      <div class="input-row">
        <input type="number" id="battery" value="19000" step="100" min="100">
        <span class="unit">mAh</span>
      </div>
    </div>
    <div class="input-group" style="margin:0;">
      <label>当前采集周期</label>
      <div class="input-row">
        <input type="number" id="t-cycle-current" value="60" step="1" min="1">
        <span class="unit">秒</span>
      </div>
    </div>
    <div class="input-group" style="margin:0;">
      <label>目标采集周期</label>
      <div class="input-row">
        <input type="number" id="t-cycle-target" value="3600" step="60" min="1">
        <span class="unit">秒</span>
      </div>
    </div>
    <div style="font-size:11px; color:#7d8590; padding-bottom:8px; line-height:1.6;">
      电流来自全程实测均值<br>放电效率 85%
    </div>
  </div>

  <!-- 实测均值状态 -->
  <div style="background:#0d1117; border:0.5px solid #30363d; border-radius:6px; padding:10px 14px; margin-bottom:16px; font-size:12px; color:#7d8590;">
    全程实测均值：<span id="r-avg-display" style="color:#e3b341; font-size:14px; font-variant-numeric:tabular-nums;">等待数据...</span>
    <span style="margin-left:16px;">已采样：<span id="r-sample-count" style="color:#7d8590;">0</span> 个点
    （<span id="r-sample-duration">0</span> 秒）</span>
    <span style="margin-left:16px; color:#7d8590; font-size:11px;">建议跑满至少一个完整周期后再看结果</span>
  </div>

  <hr class="divider">

  <div class="result-grid">
    <div class="result-card">
      <div class="r-label" id="r-label-cycle-avg">平均周期电流</div>
      <div class="r-value blue" id="r-cycle-avg-current">--<span>mA</span></div>
      <div class="r-sub">完整周期统计</div>
    </div>
    <div class="result-card">
      <div class="r-label" id="r-label-sample-power">平均单次能耗</div>
      <div class="r-value amber" id="r-sample-power">--<span>mWh</span></div>
      <div class="r-sub" id="r-sample-power-sub">--</div>
    </div>
    <div class="result-card">
      <div class="r-label" id="r-label-sample-time">平均活跃时长</div>
      <div class="r-value blue" id="r-sample-active-time">--<span>s</span></div>
      <div class="r-sub" id="r-sample-duration-sub">--</div>
    </div>
    <div class="result-card">
      <div class="r-label" id="r-label-total-cycles">平均支持次数</div>
      <div class="r-value blue" id="r-total-cycles">--<span>次</span></div>
      <div class="r-sub" id="r-cycles-sub">--</div>
    </div>
    <div class="result-card">
      <div class="r-label" id="r-label-target-life">平均预估续航</div>
      <div class="r-value green" id="r-target-life">--</div>
      <div class="r-sub" id="r-target-sub">--</div>
    </div>
  </div>
</div>

<div class="controls">
  <label class="ctrl" for="window-cycles">显示窗口</label>
  <div class="input-row" style="align-items:center; gap:8px;">
    <input type="number" id="window-cycles" value="1" step="1" min="1" style="width:80px;">
    <span class="unit">采集周期</span>
  </div>
  <button onclick="toggleFullScreen()" id="fs-btn">全屏</button>
  <button onclick="clearData()">清空</button>
  <button onclick="exportCSV()">导出 CSV</button>
  <button class="danger" onclick="resetPeak()">重置峰值</button>
</div></main>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const VOLTAGE      = 3.3;
const EFFICIENCY   = 0.85;
const WS_URL       = `ws://${window.location.hostname || 'localhost'}:8765`;
const SAMPLE_INTERVAL_MS = 200;
const MAX_POINTS   = 20000;
const SAMPLING_CURRENT_THRESHOLD = 1.0; // mA

let data = [];
let cycleData = [];
let cycleMetrics = null;
let chartYMax = 100;
let peakCurrent = 0;
let valleyCurrent = Number.POSITIVE_INFINITY;
let windowCycles = 1;
let ws = null;
let lastChartUpdate = 0;
let cycleNumber = 0; // 当前周期编号
let completedCycleCount = 0;
let sumCycleCurrent = 0;
let sumCycleEnergy = 0;
let totalEnergy_mWh = 0;
let activePeriodStartTs = null;
let activePeriodSamples = [];
let activePeriodCount = 0;
let sumActivePeriodTime = 0;
const CHART_UPDATE_INTERVAL = 100; // 100ms 更流畅的更新频率

// ── Chart ─────────────────────────────────────────────────────────────────
// 自定义插件：处理滑动窗口下的周期分界线与独立的当前进度条
const progressLinePlugin = {
  id: 'progressLine',
  afterDraw: (chart) => {
    const dataset = chart.data.datasets[0].data;
    if (!dataset || !dataset.length) return;
    
    const ctx = chart.ctx;
    const chartArea = chart.chartArea;
    const meta = chart.getDatasetMeta(0);

    const cyclePointCount = getCyclePointCount();
    // 计算从启动开始的全局绝对采样点数
    const absoluteSampleCount = cycleNumber * cyclePointCount + cycleData.length;
    if (absoluteSampleCount === 0) return;

    // 统计当前图表内有效数据点
    let realDataCount = 0;
    let lastValidIdx = -1;
    for (let i = 0; i < dataset.length; i++) {
      if (dataset[i] !== null) {
        realDataCount++;
        lastValidIdx = i;
      }
    }

    ctx.save();

    // 1. 如果窗口未画满（第一周期初始），在波形头部画引导线
    if (realDataCount > 0 && realDataCount < dataset.length) {
      const pt = meta.data[lastValidIdx];
      if (pt) {
        ctx.beginPath();
        ctx.moveTo(pt.x, chartArea.top);
        ctx.lineTo(pt.x, chartArea.bottom);
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = '#e3b341';
        ctx.setLineDash([4, 4]);
        ctx.stroke();
      }
    }

    // 2. 绘制随波形向左滑动的“周期分界线” (C1, C2...)
    ctx.lineWidth = 1.2;
    ctx.strokeStyle = 'rgba(227, 179, 65, 0.4)';
    ctx.setLineDash([4, 4]);
    for (let i = 0; i < realDataCount; i++) {
      const globalIdx = (absoluteSampleCount - realDataCount) + i;
      // 当全局索引是周期的倍数时，划定分割线
      if (globalIdx > 0 && globalIdx % cyclePointCount === 0) {
        const pt = meta.data[i];
        if (pt) {
          ctx.beginPath();
          ctx.moveTo(pt.x, chartArea.top);
          ctx.lineTo(pt.x, chartArea.bottom);
          ctx.stroke();
          // 标记周期编号
          const cNum = globalIdx / cyclePointCount;
          ctx.fillStyle = 'rgba(227, 179, 65, 0.7)';
          ctx.font = '10px "SF Mono", monospace';
          ctx.fillText(`C${cNum}`, pt.x + 4, chartArea.top + 10);
        }
      }
    }

    // 3. 绘制独立的底部横向进度条（永远从左向右扫，精准指示进度）
    const progress = cycleData.length / cyclePointCount;
    const barWidth = chartArea.right - chartArea.left;
    const fillWidth = barWidth * progress;

    // 进度条暗色背景槽
    ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
    ctx.fillRect(chartArea.left, chartArea.bottom - 0, barWidth, 1);
    
    // 进度条高亮琥珀色
    ctx.fillStyle = '#e3b341';
    ctx.fillRect(chartArea.left, chartArea.bottom - 0, fillWidth, 1);

    ctx.restore();
  }
};

const chartCurrent = new Chart(document.getElementById('chart-current'), {
  type: 'line',
  plugins: [progressLinePlugin],
  data: {
    labels: [],
    datasets: [
      {
        label: '实时电流',
        data: [],
        borderColor: '#3fb950', borderWidth: 1.5,
        pointRadius: 0, tension: 0.3,
        fill: true, backgroundColor: 'rgba(121, 192, 255, 0.12)' // 改为淡蓝色填充，与绿色曲线区分
      },
      {
        label: '移动平均',
        data: [],
        borderColor: '#79c0ff', borderWidth: 1.5,
        pointRadius: 0, tension: 0.3,
        borderDash: [6, 4],
        fill: false
      }
    ]
  },
  options: {
    responsive: true, maintainAspectRatio: false, animation: false,
    layout: { padding: { top: 6, right: 8, bottom: 16, left: 8 } },
    plugins: { legend: { display: true }, tooltip: { callbacks: { label: c => `${c.dataset.label}: ${c.parsed.y.toFixed(3)} mA` } } },
    scales: {
      x: { ticks: { color:'#7d8590', font:{size:10}, maxTicksLimit:8, autoSkip:true }, grid:{color:'#21262d'}, border:{color:'#30363d'} },
      y: { ticks: { color:'#7d8590', font:{size:10}, maxTicksLimit:6, stepSize: 10 }, grid:{color:'#21262d'}, border:{color:'#30363d'}, min: 0, max: 100 }
    }
  }
});

function timeLabel(ts) {
  const d = new Date(ts);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}

// ── 更新曲线 ───────────────────────────────────────────────────────────────
function updateChart() {
  const now = Date.now();
  if (now - lastChartUpdate < CHART_UPDATE_INTERVAL) return;
  lastChartUpdate = now;

  if (!data.length) {
    chartCurrent.data.labels = [];
    chartCurrent.data.datasets[0].data = [];
    chartCurrent.data.datasets[1].data = [];
    chartCurrent.update('none');
    return;
  }

  const tCycleCurrent = parseFloat(document.getElementById('t-cycle-current').value) || 0;
  windowCycles = parseInt(document.getElementById('window-cycles').value, 10) || 1;
  const cyclePointCount = tCycleCurrent > 0
    ? Math.max(1, Math.round(tCycleCurrent * 1000 / SAMPLE_INTERVAL_MS))
    : 1;
  const pointCount = Math.max(1, windowCycles * cyclePointCount);

  // 恢复滑动窗口模式：保持连续绘制，填满后旧数据向左缓慢退出
  const win = data.slice(-pointCount);

  const labels = win.map(d => timeLabel(d.ts));
  const currentData = win.map(d => d.current);

  const avgWindow = Math.max(1, Math.min(50, Math.floor(win.length / 3)));
  const avgData = win.map((_, idx) => {
    const slice = win.slice(Math.max(0, idx - avgWindow + 1), idx + 1);
    return slice.reduce((sum, item) => sum + item.current, 0) / slice.length;
  });

  // 补齐未满一个显示窗口的数据，使 X 轴（时间跨度）保持固定长度
  if (win.length > 0 && win.length < pointCount) {
    const missing = pointCount - win.length;
    const lastTs = win[win.length - 1].ts;
    for (let i = 1; i <= missing; i++) {
      labels.push(timeLabel(lastTs + i * SAMPLE_INTERVAL_MS));
      currentData.push(null);
      avgData.push(null);
    }
  }

  chartCurrent.data.labels = labels;
  chartCurrent.data.datasets[0].data = currentData;
  chartCurrent.data.datasets[1].data = avgData;

  chartCurrent.options.scales.y.max = chartYMax;
  chartCurrent.options.scales.y.min = 0;

  chartCurrent.update('none');
}

// ── 更新实时指标 ───────────────────────────────────────────────────────────
function getCurrentCycleValue() {
  return parseFloat(document.getElementById('t-cycle-current').value) || 0;
}

function getCyclePointCount() {
  const currentCycleSec = getCurrentCycleValue();
  return currentCycleSec > 0
    ? Math.max(1, Math.round(currentCycleSec * 1000 / SAMPLE_INTERVAL_MS))
    : 1;
}

function getAverageActivePeriodTime() {
  return activePeriodCount > 0
    ? sumActivePeriodTime / activePeriodCount
    : null;
}

function completeActivePeriod(endTs) {
  if (!activePeriodSamples.length || activePeriodStartTs === null) {
    activePeriodStartTs = null;
    activePeriodSamples = [];
    return;
  }

  const activeTime = Math.max(0, (endTs - activePeriodStartTs) / 1000);

  activePeriodCount++;
  sumActivePeriodTime += activeTime;

  activePeriodStartTs = null;
  activePeriodSamples = [];
  updateCycleMetricsUI();
}

function updateActivePeriodStats(pt) {
  const isActive = Math.abs(pt.current) > SAMPLING_CURRENT_THRESHOLD;
  const sampleTs = typeof pt.ts === 'number' ? pt.ts : Date.now();

  if (isActive && activePeriodStartTs === null) {
    activePeriodStartTs = sampleTs;
  }

  if (isActive) {
    activePeriodSamples.push(pt);
  } else if (activePeriodStartTs !== null) {
    completeActivePeriod(sampleTs);
  }
}

function updateCycleMetricsUI() {
  const avgActiveTime = getAverageActivePeriodTime();
  
  if (avgActiveTime === null) {
    document.getElementById('r-label-sample-time').textContent = `平均活跃时长`;
    document.getElementById('r-sample-active-time').innerHTML = `--<span>s</span>`;
    document.getElementById('r-sample-duration-sub').textContent = `等待一次完整活跃周期后更新`;
  } else {
    document.getElementById('r-label-sample-time').textContent = `平均活跃时长(${activePeriodCount})`;
    document.getElementById('r-sample-active-time').innerHTML = `${avgActiveTime.toFixed(2)}<span>s</span>`;
    document.getElementById('r-sample-duration-sub').textContent =
      `电流>${SAMPLING_CURRENT_THRESHOLD}mA 到 ≤${SAMPLING_CURRENT_THRESHOLD}mA 的平均时长`;
  }

  if (completedCycleCount === 0) {
    document.getElementById('r-label-cycle-avg').textContent = `平均周期电流`;
    document.getElementById('r-label-sample-power').textContent = `平均单次能耗`;
    document.getElementById('r-label-total-cycles').textContent = `平均支持次数`;
    document.getElementById('r-label-target-life').textContent = `平均预估续航`;
    document.getElementById('r-cycle-avg-current').innerHTML = `--<span>mA</span>`;
    document.getElementById('r-sample-power').innerHTML = `--<span>mWh</span>`;
    document.getElementById('r-sample-power-sub').textContent = `等待一个完整采集周期后更新`;
    document.getElementById('r-total-cycles').innerHTML = `--<span>次</span>`;
    document.getElementById('r-cycles-sub').textContent = `等待一个完整采集周期后更新`;
    document.getElementById('r-target-life').innerHTML = `--`;
    document.getElementById('r-target-sub').textContent = `等待一个完整采集周期后更新`;
  } else {
    document.getElementById('r-label-cycle-avg').textContent = `平均周期电流(${completedCycleCount})`;
    document.getElementById('r-label-sample-power').textContent = `平均单次能耗(${completedCycleCount})`;
    document.getElementById('r-label-total-cycles').textContent = `平均支持次数(${completedCycleCount})`;
    document.getElementById('r-label-target-life').textContent = `平均预估续航(${completedCycleCount})`;
    document.getElementById('r-cycle-avg-current').innerHTML = `${cycleMetrics.avgCurrent.toFixed(2)}<span>mA</span>`;
  }
}

function completeCycle(currentCycle, completedCycleData) {
  cycleNumber++; // 增加周期计数

  // 统计整个检测周期（用户设定的当前采集周期）内的平均电流和能耗
  const cycleAvgCurrent = completedCycleData.reduce((sum, item) => sum + Math.abs(item.current), 0) / completedCycleData.length;
  const cycleEnergy = completedCycleData.reduce((sum, item) => {
    const power = typeof item.power === 'number'
      ? Math.abs(item.power)
      : Math.abs(item.current) * VOLTAGE;
    return sum + power * (SAMPLE_INTERVAL_MS / 3600000);
  }, 0);

  completedCycleCount++;
  sumCycleCurrent += cycleAvgCurrent;
  sumCycleEnergy += cycleEnergy;

  cycleMetrics = {
    avgCurrent: sumCycleCurrent / completedCycleCount,
    singleCycleEnergy: sumCycleEnergy / completedCycleCount
  };

  updateCycleMetricsUI();
  calcBattery(cycleMetrics);
}

function updateMetrics(pt) {
  const el = document.getElementById('val-current');
  el.className = 'metric-value ' + (pt.current >= 0 ? 'green' : 'red');
  el.innerHTML = `${pt.current >= 0 ? '+' : ''}${pt.current.toFixed(2)}<span>mA</span>`;

  document.getElementById('val-power').innerHTML = `${pt.power.toFixed(2)}<span>mW</span>`;

  const absCurrent = Math.abs(pt.current);
  if (absCurrent > peakCurrent) {
    peakCurrent = absCurrent;
    document.getElementById('val-peak').innerHTML = `${peakCurrent.toFixed(2)}<span>mA</span>`;
    chartYMax = Math.max(10, Math.ceil(peakCurrent / 10) * 10);
  }
  if (absCurrent < valleyCurrent) {
    valleyCurrent = absCurrent;
    document.getElementById('val-valley').innerHTML = `${valleyCurrent.toFixed(2)}<span>mA</span>`;
  }

  const n = data.length;
  const totalCurrent = data.reduce((s, d) => s + Math.abs(d.current), 0);
  const avgRunCurrent = n > 0 ? totalCurrent / n : 0;
  const avgRunPower = avgRunCurrent * VOLTAGE;
  document.getElementById('r-avg-power').innerHTML = `${avgRunPower.toFixed(2)}<span>mW</span>`;
  document.getElementById('r-avg-display').textContent = `${avgRunCurrent.toFixed(3)} mA`;

  totalEnergy_mWh += Math.abs(pt.power) * (SAMPLE_INTERVAL_MS / 3600000); // 转换为 mWh
  document.getElementById('val-total-energy').innerHTML = totalEnergy_mWh >= 1
    ? `${totalEnergy_mWh.toFixed(3)}<span>mWh</span>`
    : `${(totalEnergy_mWh * 1000).toFixed(2)}<span>μWh</span>`;

  updateActivePeriodStats(pt);

  const cyclePointCount = getCyclePointCount();
  const currentCycle = getCurrentCycleValue();
  cycleData.push(pt);
  if (cycleData.length >= cyclePointCount) {
    completeCycle(currentCycle, cycleData.slice(0, cyclePointCount));
    cycleData = cycleData.slice(cyclePointCount);
  }
}

function formatBatteryLife(hours) {
  if (hours >= 24 * 30) return `${(hours / 24 / 30).toFixed(1)}<span>月</span>`;
  if (hours >= 24) return `${(hours / 24).toFixed(1)}<span>天</span>`;
  return `${hours.toFixed(1)}<span>h</span>`;
}

// ── 续航计算（全程实测均值）─────────────────────────────────────────────────
function resetCycleStats() {
  cycleData = [];
  cycleMetrics = null;
  cycleNumber = 0; // 重置周期计数
  completedCycleCount = 0;
  sumCycleCurrent = 0;
  sumCycleEnergy = 0;
  activePeriodStartTs = null;
  activePeriodSamples = [];
  activePeriodCount = 0;
  sumActivePeriodTime = 0;
  updateCycleMetricsUI();
}

function calcBattery(cycleMetrics = null) {
  const battery       = parseFloat(document.getElementById('battery').value)    || 0;
  const tCycleTarget  = parseFloat(document.getElementById('t-cycle-target').value)  || 0;

  const n = data.length;
  document.getElementById('r-sample-count').textContent = n;
  document.getElementById('r-sample-duration').textContent = (n * 0.2).toFixed(0);

  if (n === 0 || battery <= 0 || tCycleTarget <= 0) {
    return;
  }

  const avgRunCurrent = data.reduce((s, d) => s + Math.abs(d.current), 0) / n;  // mA
  const avgRunPower   = avgRunCurrent * VOLTAGE;  // mW
  document.getElementById('r-avg-display').textContent = `${avgRunCurrent.toFixed(3)} mA`;
  document.getElementById('r-avg-power').innerHTML = `${avgRunPower.toFixed(2)}<span>mW</span>`;

  if (!cycleMetrics) {
    return;
  }

  // 动态计算支持次数与续航（基于平均能耗）
  const batteryEnergy = battery * VOLTAGE * EFFICIENCY; // mWh
  const supportCount = cycleMetrics.singleCycleEnergy > 0
    ? Math.floor(batteryEnergy / cycleMetrics.singleCycleEnergy)
    : 0;
  const totalHours = supportCount * tCycleTarget / 3600;

  document.getElementById('r-sample-power').innerHTML = cycleMetrics.singleCycleEnergy >= 1
    ? `${cycleMetrics.singleCycleEnergy.toFixed(3)} mWh`
    : `${(cycleMetrics.singleCycleEnergy * 1000).toFixed(2)} μWh`;
  document.getElementById('r-sample-power-sub').textContent = `平均每次采集周期能耗`;
  document.getElementById('r-total-cycles').innerHTML = `${supportCount.toLocaleString()}<span>次</span>`;
  document.getElementById('r-cycles-sub').textContent =
    `按采集周期平均能耗 · 支持 ${supportCount.toLocaleString()} 次`;
  document.getElementById('r-target-life').innerHTML = formatBatteryLife(totalHours);
  document.getElementById('r-target-sub').textContent = 
    `目标周期 ${tCycleTarget}s · 对应 ${totalHours.toFixed(1)} 小时`;
}

// 参数变化时重算
['battery', 't-cycle-target'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => calcBattery(cycleMetrics));
});
document.getElementById('t-cycle-current').addEventListener('input', () => {
  resetCycleStats();
  calcBattery(cycleMetrics);
  updateChart();
});

// ── WebSocket ──────────────────────────────────────────────────────────────
function connect() {
  ws = new WebSocket(WS_URL);
  
  ws.onopen = () => {
    console.log('[WebSocket] ✓ 已连接');
    document.getElementById('status-dot').className = '';
    document.getElementById('status-text').textContent = '已连接 · KV-AMP700mT';
  };
  
  ws.onmessage = (e) => {
    try {
      const pt = JSON.parse(e.data);
      data.push(pt);
      if (data.length > MAX_POINTS) data.shift();
      updateMetrics(pt);
      updateChart();
    } catch (err) {
      console.error('[WebSocket] 数据解析错误:', err);
    }
  };
  
  ws.onclose = () => {
    console.warn('[WebSocket] 连接已断开');
    document.getElementById('status-dot').className = 'disconnected';
    document.getElementById('status-text').textContent = '断开 · 5s后重连...';
    setTimeout(connect, 5000);
  };
  
  ws.onerror = (err) => {
    console.error('[WebSocket] 连接错误:', err);
    document.getElementById('status-dot').className = 'disconnected';
    document.getElementById('status-text').textContent = '❌ 连接失败 · 检查服务器';
    // 显示更详细的错误提示
    const hint = document.createElement('div');
    hint.style.cssText = 'position:fixed;top:20px;right:20px;background:#f85149;color:#fff;padding:12px 16px;border-radius:8px;font-size:12px;z-index:9999;max-width:300px;';
    hint.innerHTML = `
      <div style="font-weight:bold;margin-bottom:8px;">⚠️ WebSocket 连接失败</div>
      <div style="margin-bottom:4px;">检查清单:</div>
      <div>1. Python 服务器是否启动?</div>
      <div>2. 运行: <code style="background:#000;padding:2px 4px;border-radius:3px;">python3 power_monitor.py</code></div>
      <div style="margin-top:8px;font-size:11px;color:#ddd;">若无硬件，运行: <code style="background:#000;padding:2px 4px;">DEBUG=1 python3 power_monitor.py</code></div>
    `;
    document.body.appendChild(hint);
    setTimeout(() => hint.remove(), 8000);
    ws.close();
  };
}

function clearData() {
  data = [];
  cycleData = [];
  cycleMetrics = null;
  peakCurrent = 0;
  valleyCurrent = Number.POSITIVE_INFINITY;
  totalEnergy_mWh = 0;
  activePeriodStartTs = null;
  activePeriodCount = 0;
  sumActivePeriodTime = 0;
  document.getElementById('val-peak').innerHTML = `--<span>mA</span>`;
  document.getElementById('val-valley').innerHTML = `--<span>mA</span>`;
  document.getElementById('val-total-energy').innerHTML = `--<span>mWh</span>`;
  chartCurrent.data.labels = [];
  chartCurrent.data.datasets[0].data = [];
  chartCurrent.data.datasets[1].data = [];
  chartCurrent.update();
  resetCycleStats();
}

function resetPeak() {
  peakCurrent = 0;
  document.getElementById('val-peak').innerHTML = `--<span>mA</span>`;
}

function exportCSV() {
  if (!data.length) return;
  const rows = ['timestamp,current_mA,power_mW,voltage_V'];
  data.forEach(d => rows.push(`${new Date(d.ts).toISOString()},${d.current},${d.power},${d.voltage}`));
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([rows.join('\n')], {type:'text/csv'}));
  a.download = `esp32s3_power_${Date.now()}.csv`;
  a.click();
}

function toggleFullScreen() {
  const fsButton = document.getElementById('fs-btn');
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen()
      .then(() => { fsButton.textContent = '退出全屏'; })
      .catch(err => alert(`进入全屏失败：${err.message}`));
  } else {
    document.exitFullscreen()
      .then(() => { fsButton.textContent = '全屏'; })
      .catch(err => alert(`退出全屏失败：${err.message}`));
  }
}

document.addEventListener('fullscreenchange', () => {
  const fsButton = document.getElementById('fs-btn');
  fsButton.textContent = document.fullscreenElement ? '退出全屏' : '全屏';
});

document.getElementById('window-cycles').addEventListener('input', () => {
  windowCycles = parseInt(document.getElementById('window-cycles').value, 10) || 10;
  updateChart();
});

connect();
</script>
